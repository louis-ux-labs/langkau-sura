<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - LANGKAU SURA</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: { primary: '#1B5E20', accent: '#F9A825' },
      fontFamily: { display: ['Poppins', 'sans-serif'] }
    }
  }
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="font-display bg-gradient-to-br from-emerald-900 via-slate-900 to-black text-slate-200 min-h-screen">

<!-- LOGIN PIN -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary to-green-900">
  <div class="bg-white p-8 rounded-2xl shadow-2xl w-80">
    <h1 class="text-2xl font-bold text-center mb-6 text-primary">ADMIN LOGIN</h1>
    <input id="pinInput" type="password" maxlength="6" placeholder="Masukkan PIN" class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl text-center text-2xl tracking-widest focus:border-primary outline-none">
    <button onclick="login()" class="w-full mt-4 bg-primary text-white py-3 rounded-xl font-bold hover:bg-green-800 transition">MASUK</button>
    <p class="text-xs text-gray-500 mt-4 text-center">PIN Default: 511015</p>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="adminPanel" class="hidden">
  <header class="bg-white shadow-md sticky top-0 z-40">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold text-primary">LANGKAU SURA ADMIN</h1>
      <button onclick="logout()" class="text-red-500 font-semibold">Logout</button>
    </div>
  </header>

  <div class="container mx-auto px-4 py-6 grid lg:grid-cols-3 gap-6">
    
    <!-- FORM CRUD MENU -->
    <div class="lg:col-span-2">
      <div class="bg-white p-6 rounded-2xl shadow-md mb-6">
        <h2 class="text-lg font-bold mb-4">Tambah/Edit Menu</h2>
        <div class="grid md:grid-cols-2 gap-4">
          <input id="nama" placeholder="Nama Menu" class="px-4 py-2 border rounded-lg">
          <select id="kategori" class="px-4 py-2 border rounded-lg">
            <option>Makanan</option><option>Kopi</option><option>Minuman</option><option>Snacks</option><option>Dessert</option>
          </select>
          <input id="harga" type="number" placeholder="Harga" class="px-4 py-2 border rounded-lg">
          <input id="gambar" placeholder="URL Gambar" class="px-4 py-2 border rounded-lg">
          <textarea id="deskripsi" placeholder="Deskripsi" class="md:col-span-2 px-4 py-2 border rounded-lg h-20"></textarea>
          <label class="flex items-center gap-2"><input id="tersedia" type="checkbox" checked> Tersedia</label>
          <button onclick="saveMenu()" class="bg-primary text-white py-2 rounded-lg font-semibold hover:bg-green-800">Simpan Menu</button>
        </div>
      </div>

      <!-- DAFTAR MENU -->
      <div class="bg-white p-6 rounded-2xl shadow-md">
        <h2 class="text-lg font-bold mb-4">Daftar Menu</h2>
        <div id="menuList" class="space-y-3 max-h-96 overflow-y-auto"></div>
      </div>
    </div>

    <!-- KASIR -->
    <div class="bg-white p-6 rounded-2xl shadow-md h-fit sticky top-24">
      <h2 class="text-lg font-bold mb-4">Kasir</h2>
      <div id="cartList" class="space-y-2 mb-4 max-h-64 overflow-y-auto"></div>
      <div class="border-t pt-4">
        <div class="flex justify-between font-bold text-lg mb-4">
          <span>Total:</span>
          <span id="totalHarga">Rp 0</span>
        </div>
        <button onclick="checkout()" class="w-full bg-accent text-primary py-3 rounded-xl font-bold hover:bg-yellow-400">Checkout + Cetak Struk</button>
        <button onclick="clearCart()" class="w-full mt-2 border-red-500 text-red-500 py-2 rounded-xl font-semibold">Clear</button>
      </div>
    </div>
  </div>
</div>

<script>
let menuData = [];
let cart = [];
let editId = null;

async function loadData() {
  const res = await fetch('../data/menu.json');
  menuData = (await res.json()).menu;
  renderMenuList();
}

function login() {
  if(document.getElementById('pinInput').value === '511015') {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
    loadData();
  } else alert('PIN Salah!');
}

function logout() {
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('adminPanel').classList.add('hidden');
}

function renderMenuList() {
  const list = document.getElementById('menuList');
  list.innerHTML = menuData.map(m => `
    <div class="flex justify-between items-center p-3 border rounded-lg">
      <div>
        <p class="font-semibold">${m.nama}</p>
        <p class="text-sm text-gray-500">${m.kategori} - Rp ${m.harga.toLocaleString('id-ID')}</p>
      </div>
      <div class="flex gap-2">
        <button onclick="addToCart(${m.id})" class="bg-accent px-3 py-1 rounded text-xs font-bold">+Keranjang</button>
        <button onclick="editMenu(${m.id})" class="bg-blue-500 text-white px-3 py-1 rounded text-xs">Edit</button>
        <button onclick="deleteMenu(${m.id})" class="bg-red-500 text-white px-3 py-1 rounded text-xs">Hapus</button>
      </div>
    </div>
  `).join('');
}

function addToCart(id) {
  const item = menuData.find(m => m.id === id);
  cart.push(item);
  updateCart();
}

function updateCart() {
  document.getElementById('cartList').innerHTML = cart.map((c,i) => `
    <div class="flex justify-between text-sm">
      <span>${c.nama}</span>
      <span>Rp ${c.harga.toLocaleString('id-ID')}</span>
    </div>
  `).join('');
  const total = cart.reduce((a,b) => a + b.harga, 0);
  document.getElementById('totalHarga').textContent = 'Rp ' + total.toLocaleString('id-ID');
}

function checkout() {
  if(cart.length === 0) return alert('Keranjang kosong!');
  let struk = 'LANGKAU SURA\n' + new Date().toLocaleString() + '\n\n';
  cart.forEach(c => struk += `${c.nama} - Rp ${c.harga.toLocaleString('id-ID')}\n`);
  struk += '\nTOTAL: Rp ' + cart.reduce((a,b) => a + b.harga, 0).toLocaleString('id-ID');
  alert(struk);
  clearCart();
}

function clearCart() { cart = []; updateCart(); }

function saveMenu() {
  const data = {
    id: editId || Date.now(),
    nama: document.getElementById('nama').value,
    kategori: document.getElementById('kategori').value,
    harga: parseInt(document.getElementById('harga').value),
    deskripsi: document.getElementById('deskripsi').value,
    gambar: document.getElementById('gambar').value,
    tersedia: document.getElementById('tersedia').checked
  };
  if(editId) menuData = menuData.map(m => m.id === editId ? data : m);
  else menuData.push(data);
  editId = null;
  renderMenuList();
  alert('Menu tersimpan! Export JSON manual di data/menu.json');
}

function editMenu(id) {
  const m = menuData.find(x => x.id === id);
  document.getElementById('nama').value = m.nama;
  document.getElementById('kategori').value = m.kategori;
  document.getElementById('harga').value = m.harga;
  document.getElementById('deskripsi').value = m.deskripsi;
  document.getElementById('gambar').value = m.gambar;
  document.getElementById('tersedia').checked = m.tersedia;
  editId = id;
}

function deleteMenu(id) {
  if(confirm('Hapus menu ini?')) {
    menuData = menuData.filter(m => m.id !== id);
    renderMenuList();
  }
}
</script>
</body>
</html>
