<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MENU - LANGKAU SURA</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: { primary: '#1B5E20', accent: '#F9A825' },
      fontFamily: { display: ['Poppins', 'sans-serif'] }
    }
  }
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="font-display bg-gray-50">

<!-- HEADER -->
<header class="bg-white shadow-sm sticky top-0 z-40">
  <div class="container mx-auto px-4 py-4 text-center">
    <h1 class="text-2xl font-bold text-primary tracking-tight">LANGKAU SURA</h1>
    <p class="text-xs text-gray-500">Bold Taste. Clean Vibes.</p>
  </div>
</header>

<!-- SEARCH + FILTER -->
<div class="container mx-auto px-4 py-4">
  <input id="search" type="text" placeholder="Cari menu..." class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary outline-none mb-4">
  <div id="kategoriFilter" class="flex gap-2 overflow-x-auto pb-2"></div>
</div>

<!-- MENU GRID -->
<div class="container mx-auto px-4 pb-32">
  <div id="menuGrid" class="grid grid-cols-2 gap-4"></div>
</div>

<!-- CART FLOATING -->
<button onclick="toggleCart()" class="fixed bottom-6 right-6 bg-primary text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center font-bold text-lg">
  <span id="cartCount">0</span>
</button>

<!-- CART MODAL -->
<div id="cartModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-end">
  <div class="bg-white w-full rounded-t-3xl p-6 max-h-96 overflow-y-auto">
    <div class="flex justify-between mb-4">
      <h2 class="text-xl font-bold">Keranjang</h2>
      <button onclick="toggleCart()">✕</button>
    </div>
    <div id="cartItems"></div>
    <div class="border-t pt-4 mt-4">
      <div class="flex justify-between font-bold text-lg mb-4">
        <span>Total</span>
        <span id="cartTotal">Rp 0</span>
      </div>
      <button onclick="orderWA()" class="w-full bg-accent text-primary py-4 rounded-xl font-bold text-lg">Pesan via WhatsApp</button>
    </div>
  </div>
</div>

<script>
let menuData = [];
let cart = [];
let activeKategori = 'Semua';

async function loadMenu() {
  const res = await fetch('../data/menu.json');
  const data = await res.json();
  menuData = data.menu;
  document.querySelector('h1').textContent = data.cafe.nama;
  document.querySelector('p').textContent = data.cafe.tagline;
  window.WA = data.cafe.wa;
  
  renderKategori();
  renderMenu();
}

function renderKategori() {
  const kategori = ['Semua', ...new Set(menuData.map(m => m.kategori))];
  document.getElementById('kategoriFilter').innerHTML = kategori.map(k => `
    <button onclick="filterKategori('${k}')" class="px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap ${activeKategori===k ? 'bg-primary text-white' : 'bg-gray-200'}">${k}</button>
  `).join('');
}

function filterKategori(k) {
  activeKategori = k;
  renderKategori();
  renderMenu();
}

function renderMenu() {
  const search = document.getElementById('search').value.toLowerCase();
  let filtered = menuData.filter(m => m.tersedia && m.nama.toLowerCase().includes(search));
  if(activeKategori !== 'Semua') filtered = filtered.filter(m => m.kategori === activeKategori);
  
  document.getElementById('menuGrid').innerHTML = filtered.map(m => `
    <div class="bg-white rounded-2xl shadow-md overflow-hidden">
      <img src="${m.gambar}" class="w-full h-32 object-cover">
      <div class="p-3">
        <h3 class="font-bold text-sm mb-1 line-clamp-2">${m.nama}</h3>
        <p class="text-xs text-gray-500 mb-2">${m.deskripsi.substring(0,30)}...</p>
        <div class="flex justify-between items-center">
          <span class="font-bold text-primary">Rp ${m.harga.toLocaleString('id-ID')}</span>
          <button onclick="addCart(${m.id})" class="bg-accent text-primary px-3 py-1 rounded-lg text-xs font-bold">+</button>
        </div>
      </div>
    </div>
  `).join('');
}

function addCart(id) {
  cart.push(menuData.find(m => m.id === id));
  updateCartCount();
}

function updateCartCount() {
  document.getElementById('cartCount').textContent = cart.length;
}

function toggleCart() {
  document.getElementById('cartModal').classList.toggle('hidden');
  document.getElementById('cartItems').innerHTML = cart.map((c,i) => `
    <div class="flex justify-between py-2 border-b">
      <span class="text-sm">${c.nama}</span>
      <span class="font-semibold text-sm">Rp ${c.harga.toLocaleString('id-ID')}</span>
    </div>
  `).join('');
  document.getElementById('cartTotal').textContent = 'Rp ' + cart.reduce((a,b) => a + b.harga, 0).toLocaleString('id-ID');
}

function orderWA() {
  if(cart.length === 0) return alert('Keranjang kosong!');
  let pesan = 'Halo LANGKAU SURA, saya mau pesan:%0A%0A';
  cart.forEach(c => pesan += `- ${c.nama} Rp ${c.harga.toLocaleString('id-ID')}%0A`);
  pesan += '%0ATotal: Rp ' + cart.reduce((a,b) => a + b.harga, 0).toLocaleString('id-ID');
  window.open(`https://wa.me/${window.WA}?text=${pesan}`, '_blank');
}

document.getElementById('search').addEventListener('input', renderMenu);
loadMenu();
</script>
</body>
</html>
